<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Atividade 9</title>
</head>
<body>

  <h1>Atividade 9 - Funções</h1>

  <!-- FUNÇÃO 1 -->
  <h3>1) Maior Número</h3>
  <input type="number" id="n1" placeholder="Número 1">
  <input type="number" id="n2" placeholder="Número 2">
  <input type="number" id="n3" placeholder="Número 3">

  <button id="btnMaior">Calcular Maior</button>
  <p id="resMaior"></p>

  <hr>

  <!-- FUNÇÃO 2  -->
  <h3>2) Ordem Crescente</h3>
  <input type="number" id="n4" placeholder="Número 1">
  <input type="number" id="n5" placeholder="Número 2">
  <input type="number" id="n6" placeholder="Número 3">

  <button id="btnOrdem">Ordenar</button>
  <p id="resOrdem"></p>

  <hr>

  <!-- FUNÇÃO 3 -->
  <h3>3) Palíndromo</h3>
  <input type="text" id="texto" placeholder="Digite uma palavra">
  <button id="btnPalindromo">Verificar</button>
  <p id="resPalindromo"></p>

  <hr>

  <!-- FUNÇÃO 4 -->
  <h3>4) Subconjunto</h3>
  <input type="text" id="palavra1" placeholder="Primeira palavra">
  <input type="text" id="palavra2" placeholder="Segunda palavra">
  <button id="btnSubconjunto">Verificar</button>
  <p id="resSubconjunto"></p>

  <hr>

  <!-- FUNÇÃO 5 -->
  <h3>5) Dia da Semana</h3>
  <input type="date" id="data">
  <button id="btnData">Verificar</button>
  <p id="resData"></p>

  <script src="script.js"></script>
</body>
</html>
